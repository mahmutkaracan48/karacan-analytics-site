# Triggers Vercel Production deploy only when site config changes (NOT previews/reports HTML).
# previews/ + reports/ are served via vercel.json rewrite; Ignored Build Step is backup.
#
# Setup: Vercel → Settings → Deploy Hooks → VERCEL_DEPLOY_HOOK in GitHub secrets.

name: Deploy Vercel Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "previews/**"
      - "reports/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK secret is missing — skip"
            exit 0
          fi
          echo "Calling Vercel deploy hook..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Deploy hook accepted."
