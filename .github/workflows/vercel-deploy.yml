# Triggers Vercel Production deploy after every push to main.
# Setup (one time):
#   1. Vercel → Project karacan-analytics-site → Settings → Deploy Hooks → Create Hook (Production)
#   2. GitHub → repo Settings → Secrets → Actions → New: VERCEL_DEPLOY_HOOK = paste hook URL
# Note: GitHub does not allow `secrets` in job/step `if:` — pass via env and check in shell.

name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK secret is missing."
            echo "Add it from Vercel → Settings → Deploy Hooks, or connect Git in Vercel project settings."
            exit 0
          fi
          echo "Calling Vercel deploy hook..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Deploy hook accepted (build started on Vercel)."
